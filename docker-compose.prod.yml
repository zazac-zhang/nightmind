# ============================================================
# NightMind 生产环境
# ============================================================
version: '3.8'

services:
  # ============================================================
  # NightMind 应用
  # ============================================================
  nightmind:
    image: ghcr.io/yourusername/nightmind:latest
    container_name: nightmind-app
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - QDRANT_URL=${QDRANT_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - RUST_LOG=info
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: always
    networks:
      - nightmind-net

  # ============================================================
  # PostgreSQL
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: nightmind-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - nightmind-net

  # ============================================================
  # Redis
  # ============================================================
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - nightmind-net

  # ============================================================
  # Qdrant
  # ============================================================
  qdrant:
    image: qdrant/qdrant:v1.8.2
    container_name: nightmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always
    networks:
      - nightmind-net

networks:
  nightmind-net:
    name: nightmind-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
